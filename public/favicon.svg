<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- FIFA World Cup 2026 "Trionda" inspired ball: white base with red, green
       and blue accents for the three host nations (USA, Mexico, Canada). -->
  <defs>
    <clipPath id="ball">
      <circle cx="32" cy="32" r="29" />
    </clipPath>
  </defs>

  <!-- Ball body -->
  <circle cx="32" cy="32" r="29" fill="#f7f7f4" stroke="#1a1a1a" stroke-width="2.5" />

  <!-- Tri-onda waves: three colored bands swirling from the centre -->
  <g clip-path="url(#ball)" stroke-linecap="round" fill="none" stroke-width="6">
    <!-- red wave -->
    <path d="M32 32 C 22 22, 10 24, 4 34" stroke="#e4002b" />
    <!-- green wave -->
    <path d="M32 32 C 44 24, 58 28, 62 40" stroke="#009639" />
    <!-- blue wave -->
    <path d="M32 32 C 30 44, 34 56, 28 66" stroke="#0057b8" />
  </g>

  <!-- Central pivot -->
  <circle cx="32" cy="32" r="4.5" fill="#1a1a1a" />
</svg>
